<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeHaven Admin Login</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fdfcf9;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #AF8F66;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .error {
            color: #D32F2F;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2>Admin Login</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email Address" required value="admin@luxehaven.com">
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="btn">Sign In</button>
            <div id="error-msg" class="error">Invalid credentials</div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn');
            const errorMsg = document.getElementById('error-msg');

            btn.disabled = true;
            btn.innerText = "Processing...";
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('../api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const text = await response.text();
                let json;
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    console.error("Server returned non-JSON response:", text);
                    alert("Server Error: The server returned an invalid response. This often happens if PHP encountered a fatal error. Check your XAMPP error logs.\n\nRaw Response: " + text.substring(0, 200));
                    return;
                }

                if (json.status === "success") {
                    localStorage.setItem("admin_user", JSON.stringify(json.admin));
                    window.location.href = "dashboard.html";
                } else {
                    errorMsg.innerText = json.message || "Invalid credentials";
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                console.error("Fetch error:", err);
                alert("Network Error: Could not connect to the login API. Please ensure Apache and MySQL are both running in your XAMPP Control Panel.\n\nDetails: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Sign In";
            }
        };
    </script>
</body>

</html>
